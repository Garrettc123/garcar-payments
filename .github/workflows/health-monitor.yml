name: 🩺 Health Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:

jobs:
  health-check:
    name: Check garcar-payments health
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          SERVICE_URL: ${{ secrets.GARCAR_PAYMENTS_URL }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" --max-time 10 || echo "000")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Health check FAILED (HTTP $STATUS) — creating Linear alert"
            curl -s -X POST https://api.linear.app/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $LINEAR_API_KEY" \
              -d '{"query":"mutation { issueCreate(input: { title: \"🚨 garcar-payments DOWN (HTTP '$STATUS')\", teamId: \"'"$LINEAR_TEAM_ID"'\", priority: 1, description: \"Health check failed. Immediate action required. URL: '$SERVICE_URL'\" }) { success issue { identifier url } } }"}'
          else
            echo "✅ Service healthy"
          fi
