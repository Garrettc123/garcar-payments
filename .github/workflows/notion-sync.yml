name: 📚 Notion Revenue Sync

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  notion-sync:
    name: Sync MRR to Notion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync MRR to Notion
        env:
          GARCAR_PAYMENTS_URL: ${{ secrets.GARCAR_PAYMENTS_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_REVENUE_DB_ID: ${{ secrets.NOTION_REVENUE_DB_ID }}
        run: |
          python - <<'EOF'
          import requests, os, datetime, json

          payments_url = os.environ["GARCAR_PAYMENTS_URL"]
          notion_token = os.environ["NOTION_TOKEN"]
          db_id        = os.environ["NOTION_REVENUE_DB_ID"]

          # Fetch MRR from garcar-payments
          r = requests.get(f"{payments_url}/mrr", timeout=15)
          r.raise_for_status()
          data = r.json()
          mrr            = data["mrr_usd"]
          total_payments = data["total_payments"]
          now            = datetime.datetime.utcnow().isoformat()

          print(f"MRR: ${mrr} | Payments: {total_payments}")

          # Push to Notion database
          notion_headers = {
              "Authorization": f"Bearer {notion_token}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28",
          }
          payload = {
              "parent": {"database_id": db_id},
              "properties": {
                  "Name":            {"title": [{"text": {"content": f"MRR Snapshot {now[:10]}"}}]},
                  "MRR (USD)":       {"number": mrr},
                  "Total Payments":  {"number": total_payments},
                  "Timestamp":       {"date":   {"start": now}},
              },
          }
          resp = requests.post("https://api.notion.com/v1/pages", headers=notion_headers, json=payload)
          if resp.status_code in (200, 201):
              print(f"✅ Notion synced: MRR=${mrr}")
          else:
              print(f"⚠️ Notion sync failed: {resp.status_code} {resp.text}")
          EOF
