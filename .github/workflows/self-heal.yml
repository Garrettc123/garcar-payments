name: "\U0001F527 Self-Heal Pipeline"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: 'Force redeploy even if healthy'
        required: false
        default: 'false'

jobs:
  self-heal:
    name: Auto-recover garcar-payments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️ RAILWAY_TOKEN not configured — skipping"
            exit 0
          fi
          echo "Self-healing: redeploying garcar-payments"
          railway up --service garcar-payments

      - name: Notify Linear recovery
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then
            echo "⚠️ LINEAR_API_KEY not configured — skipping"
            exit 0
          fi
          if [ -z "$LINEAR_TEAM_ID" ]; then
            echo "⚠️ LINEAR_TEAM_ID not configured — skipping"
            exit 0
          fi
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_API_KEY" \
            -d '{"query":"mutation { issueCreate(input: { title: \"garcar-payments self-healed and redeployed\", teamId: \"'"$LINEAR_TEAM_ID"'\", priority: 3, description: \"Self-heal workflow triggered and redeployed successfully.\" }) { success } }"}' \
            || echo "Linear notify optional"
