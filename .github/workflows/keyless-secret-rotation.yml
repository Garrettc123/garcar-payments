name: 🔄 Keyless Secret Rotation

on:
  schedule:
    - cron: '0 0 * * 0'  # every Sunday at midnight
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    name: Auto-rotate Stripe webhook signing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install stripe requests cryptography

      - name: Rotate webhook + generate Ed25519 keypair
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          GARCAR_PAYMENTS_URL: ${{ secrets.GARCAR_PAYMENTS_URL }}
        run: |
          python - <<'EOF'
          import os, stripe, requests, json, base64
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives.serialization import (
              Encoding, PublicFormat, PrivateFormat, NoEncryption
          )

          stripe.api_key = os.environ["STRIPE_SECRET_KEY"]
          service_url    = os.environ.get("GARCAR_PAYMENTS_URL", "")
          linear_key     = os.environ.get("LINEAR_API_KEY", "")
          linear_team    = os.environ.get("LINEAR_TEAM_ID", "")

          # ── Generate fresh Ed25519 keypair for contract signing
          private_key = Ed25519PrivateKey.generate()
          pub_bytes   = private_key.public_key().public_bytes(Encoding.Raw, PublicFormat.Raw)
          priv_bytes  = private_key.private_bytes(Encoding.Raw, PrivateFormat.Raw, NoEncryption())
          pub_b64     = base64.b64encode(pub_bytes).decode()
          priv_b64    = base64.b64encode(priv_bytes).decode()

          print(f"[KEYLESS] New Ed25519 public key: {pub_b64}")
          print(f"[KEYLESS] Private key generated (store as GARCAR_ED25519_PRIVATE_KEY secret)")

          # ── List + rotate Stripe webhooks
          endpoints = stripe.WebhookEndpoint.list(limit=10)
          for ep in endpoints.auto_paging_iter():
              if service_url and service_url in ep.url:
                  rotated = stripe.WebhookEndpoint.modify(
                      ep.id,
                      enabled_events=[
                          "customer.subscription.created",
                          "customer.subscription.deleted",
                          "invoice.paid",
                          "invoice.payment_failed",
                          "checkout.session.completed",
                      ],
                  )
                  print(f"[STRIPE] Webhook rotated: {rotated.id} → {rotated.url}")

          # ── Notify Linear
          if linear_key:
              requests.post(
                  "https://api.linear.app/graphql",
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {linear_key}"},
                  json={"query": f"""
                      mutation {{
                          issueCreate(input: {{
                              title: "[Security] Ed25519 keypair rotated + Stripe webhook updated",
                              teamId: \"{linear_team}\",
                              priority: 3,
                              description: "Weekly keyless rotation complete. New Ed25519 pub: {pub_b64}"
                          }}) {{ success }}
                      }}
                  """},
                  timeout=15,
              )
          print("[KEYLESS] Rotation complete")
          EOF
