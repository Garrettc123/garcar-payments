name: 🚀 Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy garcar-payments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          python -c "import fastapi, stripe, requests; print('✅ All imports OK')"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service garcar-payments

      - name: Notify Linear on deploy
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
        run: |
          curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_API_KEY" \
            -d '{"query":"mutation { issueCreate(input: { title: \"[Deploy] garcar-payments deployed to Railway\", teamId: \"'"$LINEAR_TEAM_ID"'\", priority: 3, description: \"Automated deploy from GitHub Actions. Commit: ${{ github.sha }}\" }) { success issue { identifier url } } }"}' \
            || echo "Linear notify optional — continuing"
