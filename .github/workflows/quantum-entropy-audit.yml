name: ⚛️ Quantum Entropy Audit

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:

jobs:
  entropy-audit:
    name: Audit cryptographic entropy + HMAC integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cryptography stack
        run: pip install cryptography requests

      - name: Run quantum entropy + HMAC audit
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
        run: |
          python - <<'EOF'
          import os, hashlib, hmac, secrets, time, json, requests, base64
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives.kdf.hkdf import HKDF
          from cryptography.hazmat.primitives import hashes
          from cryptography.hazmat.backends import default_backend

          linear_key  = os.environ.get("LINEAR_API_KEY", "")
          linear_team = os.environ.get("LINEAR_TEAM_ID", "")
          report      = []

          # ── 1. Entropy quality test (256-bit quantum-safe pool)
          entropy_pool = secrets.token_bytes(32)
          entropy_hex  = entropy_pool.hex()
          bit_count    = bin(int(entropy_hex, 16)).count('1')
          entropy_score = round((bit_count / 256) * 100, 2)
          report.append(f"Entropy pool: {entropy_hex[:16]}... | Bit density: {entropy_score}% (ideal: ~50%)")
          print(f"[ENTROPY] {report[-1]}")

          # ── 2. HKDF key derivation (quantum-resistant key expansion)
          derived = HKDF(
              algorithm=hashes.SHA3_256(),
              length=32,
              salt=None,
              info=b"garcar-payments-v1",
              backend=default_backend(),
          ).derive(entropy_pool)
          report.append(f"HKDF-SHA3-256 derived key: {derived.hex()[:32]}...")
          print(f"[HKDF] {report[-1]}")

          # ── 3. Ed25519 sign + verify round-trip
          priv = Ed25519PrivateKey.generate()
          msg  = b"garcar-enterprise-integrity-check-" + str(int(time.time())).encode()
          sig  = priv.sign(msg)
          try:
              priv.public_key().verify(sig, msg)
              report.append(f"Ed25519 sign/verify: PASS | msg_len={len(msg)} sig_len={len(sig)}")
          except Exception as e:
              report.append(f"Ed25519 sign/verify: FAIL — {e}")
          print(f"[Ed25519] {report[-1]}")

          # ── 4. SHA3-256 HMAC integrity on payments.py
          import pathlib
          code = pathlib.Path("backend/payments.py").read_bytes()
          mac  = hmac.new(entropy_pool, code, hashlib.sha3_256).hexdigest()
          report.append(f"payments.py HMAC-SHA3-256: {mac[:32]}... (session-bound)")
          print(f"[HMAC] {report[-1]}")

          # ── 5. Notify Linear with full entropy report
          summary = "\n".join(f"- {r}" for r in report)
          if linear_key:
              requests.post(
                  "https://api.linear.app/graphql",
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {linear_key}"},
                  json={"query": f"""
                      mutation {{
                          issueCreate(input: {{
                              title: "[⚛️ Entropy] Daily cryptographic audit passed",
                              teamId: \"{linear_team}\",
                              priority: 4,
                              description: "## Quantum Entropy Audit\n\n{summary}"
                          }}) {{ success }}
                      }}
                  """},
                  timeout=15,
              )
          print("[AUDIT] Complete")
          EOF
